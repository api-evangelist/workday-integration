naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday ACA Partner Integrations API — ACA Compliance
  description: 'Workday Integration Workday ACA Partner Integrations API — ACA Compliance. 2 operations. Lead operation: Workday
    Integration Retrieve a collection of acaReports. Self-contained Naftiko capability covering one Workday Integration business
    surface.'
  tags:
  - Workday Integration
  - ACA Compliance
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: aca-partner-integrations-aca-compliance
    baseUri: https://{baseUrl}/ccx/api/acaPartnerIntegrations/v1/{tenant}
    description: Workday Integration Workday ACA Partner Integrations API — ACA Compliance business capability. Self-contained,
      no shared references.
    resources:
    - name: acaReports
      path: /acaReports
      operations:
      - name: getacareports
        method: GET
        description: Workday Integration Retrieve a collection of acaReports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: acaReports-ID
      path: /acaReports/{ID}
      operations:
      - name: getacareportbyid
        method: GET
        description: Workday Integration Retrieve a specific ACAReport
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: aca-partner-integrations-aca-compliance-rest
    port: 8080
    description: REST adapter for Workday Integration Workday ACA Partner Integrations API — ACA Compliance. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/acareports
      name: acareports
      description: REST surface for acaReports.
      operations:
      - method: GET
        name: getacareports
        description: Workday Integration Retrieve a collection of acaReports
        call: aca-partner-integrations-aca-compliance.getacareports
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/acareports/{id}
      name: acareports-id
      description: REST surface for acaReports-ID.
      operations:
      - method: GET
        name: getacareportbyid
        description: Workday Integration Retrieve a specific ACAReport
        call: aca-partner-integrations-aca-compliance.getacareportbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: aca-partner-integrations-aca-compliance-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday ACA Partner Integrations API — ACA Compliance. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-collection-acareports
      description: Workday Integration Retrieve a collection of acaReports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aca-partner-integrations-aca-compliance.getacareports
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-acareport
      description: Workday Integration Retrieve a specific ACAReport
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: aca-partner-integrations-aca-compliance.getacareportbyid
      outputParameters:
      - type: object
        mapping: $.
