naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Human Capital Management API — Payroll
  description: 'Workday Integration Workday Human Capital Management API — Payroll. 1 operations. Lead operation: Workday
    Integration Retrieve pay slips for a worker. Self-contained Naftiko capability covering one Workday Integration business
    surface.'
  tags:
  - Workday Integration
  - Payroll
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: human-capital-management-payroll
    baseUri: https://{baseUrl}/ccx/api/v1/{tenant}
    description: Workday Integration Workday Human Capital Management API — Payroll business capability. Self-contained, no
      shared references.
    resources:
    - name: workers-ID-paySlips
      path: /workers/{ID}/paySlips
      operations:
      - name: getworkerpayslips
        method: GET
        description: Workday Integration Retrieve pay slips for a worker
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: human-capital-management-payroll-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Human Capital Management API — Payroll. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/workers/{id}/payslips
      name: workers-id-payslips
      description: REST surface for workers-ID-paySlips.
      operations:
      - method: GET
        name: getworkerpayslips
        description: Workday Integration Retrieve pay slips for a worker
        call: human-capital-management-payroll.getworkerpayslips
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: human-capital-management-payroll-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Human Capital Management API — Payroll. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-pay-slips
      description: Workday Integration Retrieve pay slips for a worker
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: human-capital-management-payroll.getworkerpayslips
      outputParameters:
      - type: object
        mapping: $.
