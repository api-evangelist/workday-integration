naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Payroll API — Tax Rates
  description: 'Workday Integration Workday Payroll API — Tax Rates. 2 operations. Lead operation: Workday Integration Retrieve
    company SUI rates. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Tax Rates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: payroll-tax-rates
    baseUri: https://{baseUrl}/ccx/api/payroll/v2/{tenant}
    description: Workday Integration Workday Payroll API — Tax Rates business capability. Self-contained, no shared references.
    resources:
    - name: companySUIRates
      path: /companySUIRates
      operations:
      - name: getcompanysuirates
        method: GET
        description: Workday Integration Retrieve company SUI rates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcompanysuirate
        method: POST
        description: Workday Integration Create a company SUI rate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: payroll-tax-rates-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Payroll API — Tax Rates. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/companysuirates
      name: companysuirates
      description: REST surface for companySUIRates.
      operations:
      - method: GET
        name: getcompanysuirates
        description: Workday Integration Retrieve company SUI rates
        call: payroll-tax-rates.getcompanysuirates
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcompanysuirate
        description: Workday Integration Create a company SUI rate
        call: payroll-tax-rates.createcompanysuirate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payroll-tax-rates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Payroll API — Tax Rates. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-company-sui
      description: Workday Integration Retrieve company SUI rates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payroll-tax-rates.getcompanysuirates
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-create-company-sui
      description: Workday Integration Create a company SUI rate
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payroll-tax-rates.createcompanysuirate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
