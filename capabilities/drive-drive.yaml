naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Drive API — Drive
  description: 'Workday Integration Workday Drive API — Drive. 2 operations. Lead operation: Workday Integration Retrieve
    a collection of files. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Drive
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: drive-drive
    baseUri: https://{baseUrl}/ccx/api/drive/v1/{tenant}
    description: Workday Integration Workday Drive API — Drive business capability. Self-contained, no shared references.
    resources:
    - name: files
      path: /files
      operations:
      - name: getfiles
        method: GET
        description: Workday Integration Retrieve a collection of files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: files-ID
      path: /files/{ID}
      operations:
      - name: getfilebyid
        method: GET
        description: Workday Integration Retrieve a specific File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: drive-drive-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Drive API — Drive. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/files
      name: files
      description: REST surface for files.
      operations:
      - method: GET
        name: getfiles
        description: Workday Integration Retrieve a collection of files
        call: drive-drive.getfiles
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/files/{id}
      name: files-id
      description: REST surface for files-ID.
      operations:
      - method: GET
        name: getfilebyid
        description: Workday Integration Retrieve a specific File
        call: drive-drive.getfilebyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: drive-drive-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Drive API — Drive. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-collection-files
      description: Workday Integration Retrieve a collection of files
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: drive-drive.getfiles
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-file
      description: Workday Integration Retrieve a specific File
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: drive-drive.getfilebyid
      outputParameters:
      - type: object
        mapping: $.
