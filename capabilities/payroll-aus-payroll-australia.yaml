naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Payroll AUS API — Payroll Australia
  description: 'Workday Integration Workday Payroll AUS API — Payroll Australia. 2 operations. Lead operation: Workday Integration
    Retrieve a collection of payrollRuns. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Payroll Australia
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: payroll-aus-payroll-australia
    baseUri: https://{baseUrl}/ccx/api/payrollAUS/v1/{tenant}
    description: Workday Integration Workday Payroll AUS API — Payroll Australia business capability. Self-contained, no shared
      references.
    resources:
    - name: payrollRuns
      path: /payrollRuns
      operations:
      - name: getpayrollruns
        method: GET
        description: Workday Integration Retrieve a collection of payrollRuns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payrollRuns-ID
      path: /payrollRuns/{ID}
      operations:
      - name: getpayrollrunbyid
        method: GET
        description: Workday Integration Retrieve a specific PayrollRun
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: payroll-aus-payroll-australia-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Payroll AUS API — Payroll Australia. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/payrollruns
      name: payrollruns
      description: REST surface for payrollRuns.
      operations:
      - method: GET
        name: getpayrollruns
        description: Workday Integration Retrieve a collection of payrollRuns
        call: payroll-aus-payroll-australia.getpayrollruns
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payrollruns/{id}
      name: payrollruns-id
      description: REST surface for payrollRuns-ID.
      operations:
      - method: GET
        name: getpayrollrunbyid
        description: Workday Integration Retrieve a specific PayrollRun
        call: payroll-aus-payroll-australia.getpayrollrunbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payroll-aus-payroll-australia-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Payroll AUS API — Payroll Australia. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-collection-payrollruns
      description: Workday Integration Retrieve a collection of payrollRuns
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payroll-aus-payroll-australia.getpayrollruns
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-payrollrun
      description: Workday Integration Retrieve a specific PayrollRun
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payroll-aus-payroll-australia.getpayrollrunbyid
      outputParameters:
      - type: object
        mapping: $.
