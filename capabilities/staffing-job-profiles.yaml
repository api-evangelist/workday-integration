naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Staffing API — Job Profiles
  description: 'Workday Integration Workday Staffing API — Job Profiles. 2 operations. Lead operation: Workday Integration
    Retrieve job profiles. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Job Profiles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: staffing-job-profiles
    baseUri: https://{baseUrl}/ccx/api/staffing/v1/{tenant}
    description: Workday Integration Workday Staffing API — Job Profiles business capability. Self-contained, no shared references.
    resources:
    - name: jobProfiles
      path: /jobProfiles
      operations:
      - name: getjobprofiles
        method: GET
        description: Workday Integration Retrieve job profiles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: jobProfiles-ID
      path: /jobProfiles/{ID}
      operations:
      - name: getjobprofilebyid
        method: GET
        description: Workday Integration Retrieve a specific job profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: staffing-job-profiles-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Staffing API — Job Profiles. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/jobprofiles
      name: jobprofiles
      description: REST surface for jobProfiles.
      operations:
      - method: GET
        name: getjobprofiles
        description: Workday Integration Retrieve job profiles
        call: staffing-job-profiles.getjobprofiles
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobprofiles/{id}
      name: jobprofiles-id
      description: REST surface for jobProfiles-ID.
      operations:
      - method: GET
        name: getjobprofilebyid
        description: Workday Integration Retrieve a specific job profile
        call: staffing-job-profiles.getjobprofilebyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: staffing-job-profiles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Staffing API — Job Profiles. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-job-profiles
      description: Workday Integration Retrieve job profiles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: staffing-job-profiles.getjobprofiles
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-job
      description: Workday Integration Retrieve a specific job profile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: staffing-job-profiles.getjobprofilebyid
      outputParameters:
      - type: object
        mapping: $.
