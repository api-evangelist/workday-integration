naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Metadata Translations API — Metadata Translations
  description: 'Workday Integration Workday Metadata Translations API — Metadata Translations. 2 operations. Lead operation:
    Workday Integration Retrieve a collection of metadataTranslations. Self-contained Naftiko capability covering one Workday
    Integration business surface.'
  tags:
  - Workday Integration
  - Metadata Translations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: metadata-translations-metadata-translations
    baseUri: https://{baseUrl}/ccx/api/metadataTranslations/v1/{tenant}
    description: Workday Integration Workday Metadata Translations API — Metadata Translations business capability. Self-contained,
      no shared references.
    resources:
    - name: metadataTranslations
      path: /metadataTranslations
      operations:
      - name: getmetadatatranslations
        method: GET
        description: Workday Integration Retrieve a collection of metadataTranslations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: metadataTranslations-ID
      path: /metadataTranslations/{ID}
      operations:
      - name: getmetadatatranslationbyid
        method: GET
        description: Workday Integration Retrieve a specific MetadataTranslation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: metadata-translations-metadata-translations-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Metadata Translations API — Metadata Translations. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/metadatatranslations
      name: metadatatranslations
      description: REST surface for metadataTranslations.
      operations:
      - method: GET
        name: getmetadatatranslations
        description: Workday Integration Retrieve a collection of metadataTranslations
        call: metadata-translations-metadata-translations.getmetadatatranslations
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/metadatatranslations/{id}
      name: metadatatranslations-id
      description: REST surface for metadataTranslations-ID.
      operations:
      - method: GET
        name: getmetadatatranslationbyid
        description: Workday Integration Retrieve a specific MetadataTranslation
        call: metadata-translations-metadata-translations.getmetadatatranslationbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: metadata-translations-metadata-translations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Metadata Translations API — Metadata Translations. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-collection-metadatatranslations
      description: Workday Integration Retrieve a collection of metadataTranslations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: metadata-translations-metadata-translations.getmetadatatranslations
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-metadatatranslation
      description: Workday Integration Retrieve a specific MetadataTranslation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: metadata-translations-metadata-translations.getmetadatatranslationbyid
      outputParameters:
      - type: object
        mapping: $.
