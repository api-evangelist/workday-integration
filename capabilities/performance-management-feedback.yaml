naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Performance Management API — Feedback
  description: 'Workday Integration Workday Performance Management API — Feedback. 2 operations. Lead operation: Workday Integration
    Retrieve feedback badges. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Feedback
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: performance-management-feedback
    baseUri: https://{baseUrl}/ccx/api/performanceManagement/v1/{tenant}
    description: Workday Integration Workday Performance Management API — Feedback business capability. Self-contained, no
      shared references.
    resources:
    - name: feedbackBadges
      path: /feedbackBadges
      operations:
      - name: getfeedbackbadges
        method: GET
        description: Workday Integration Retrieve feedback badges
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: feedbackBadges-ID
      path: /feedbackBadges/{ID}
      operations:
      - name: getfeedbackbadgebyid
        method: GET
        description: Workday Integration Retrieve a specific feedback badge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: performance-management-feedback-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Performance Management API — Feedback. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/feedbackbadges
      name: feedbackbadges
      description: REST surface for feedbackBadges.
      operations:
      - method: GET
        name: getfeedbackbadges
        description: Workday Integration Retrieve feedback badges
        call: performance-management-feedback.getfeedbackbadges
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/feedbackbadges/{id}
      name: feedbackbadges-id
      description: REST surface for feedbackBadges-ID.
      operations:
      - method: GET
        name: getfeedbackbadgebyid
        description: Workday Integration Retrieve a specific feedback badge
        call: performance-management-feedback.getfeedbackbadgebyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: performance-management-feedback-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Performance Management API — Feedback. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-feedback-badges
      description: Workday Integration Retrieve feedback badges
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: performance-management-feedback.getfeedbackbadges
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-feedback
      description: Workday Integration Retrieve a specific feedback badge
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: performance-management-feedback.getfeedbackbadgebyid
      outputParameters:
      - type: object
        mapping: $.
