naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Financial Management API — Suppliers
  description: 'Workday Integration Workday Financial Management API — Suppliers. 2 operations. Lead operation: Workday Integration
    Retrieve a collection of suppliers. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Suppliers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: financial-management-suppliers
    baseUri: https://{baseUrl}/ccx/api/v1/{tenant}
    description: Workday Integration Workday Financial Management API — Suppliers business capability. Self-contained, no
      shared references.
    resources:
    - name: suppliers
      path: /suppliers
      operations:
      - name: getsuppliers
        method: GET
        description: Workday Integration Retrieve a collection of suppliers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: suppliers-ID
      path: /suppliers/{ID}
      operations:
      - name: getsupplierbyid
        method: GET
        description: Workday Integration Retrieve a specific supplier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: financial-management-suppliers-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Financial Management API — Suppliers. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/suppliers
      name: suppliers
      description: REST surface for suppliers.
      operations:
      - method: GET
        name: getsuppliers
        description: Workday Integration Retrieve a collection of suppliers
        call: financial-management-suppliers.getsuppliers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/suppliers/{id}
      name: suppliers-id
      description: REST surface for suppliers-ID.
      operations:
      - method: GET
        name: getsupplierbyid
        description: Workday Integration Retrieve a specific supplier
        call: financial-management-suppliers.getsupplierbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: financial-management-suppliers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Financial Management API — Suppliers. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-collection-suppliers
      description: Workday Integration Retrieve a collection of suppliers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-management-suppliers.getsuppliers
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-supplier
      description: Workday Integration Retrieve a specific supplier
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-management-suppliers.getsupplierbyid
      outputParameters:
      - type: object
        mapping: $.
