naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Admissions API — Admissions
  description: 'Workday Integration Workday Admissions API — Admissions. 2 operations. Lead operation: Workday Integration
    Retrieve a collection of applications. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Admissions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: admissions-admissions
    baseUri: https://{baseUrl}/ccx/api/admissions/v1/{tenant}
    description: Workday Integration Workday Admissions API — Admissions business capability. Self-contained, no shared references.
    resources:
    - name: applications
      path: /applications
      operations:
      - name: getapplications
        method: GET
        description: Workday Integration Retrieve a collection of applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: applications-ID
      path: /applications/{ID}
      operations:
      - name: getapplicationbyid
        method: GET
        description: Workday Integration Retrieve a specific Application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: admissions-admissions-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Admissions API — Admissions. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/applications
      name: applications
      description: REST surface for applications.
      operations:
      - method: GET
        name: getapplications
        description: Workday Integration Retrieve a collection of applications
        call: admissions-admissions.getapplications
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/applications/{id}
      name: applications-id
      description: REST surface for applications-ID.
      operations:
      - method: GET
        name: getapplicationbyid
        description: Workday Integration Retrieve a specific Application
        call: admissions-admissions.getapplicationbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admissions-admissions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Admissions API — Admissions. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-collection-applications
      description: Workday Integration Retrieve a collection of applications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admissions-admissions.getapplications
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-application
      description: Workday Integration Retrieve a specific Application
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admissions-admissions.getapplicationbyid
      outputParameters:
      - type: object
        mapping: $.
