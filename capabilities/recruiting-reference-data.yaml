naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Recruiting API — Reference Data
  description: 'Workday Integration Workday Recruiting API — Reference Data. 1 operations. Lead operation: Workday Integration
    Retrieve available countries. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Reference Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: recruiting-reference-data
    baseUri: https://{baseUrl}/ccx/api/recruiting/v1/{tenant}
    description: Workday Integration Workday Recruiting API — Reference Data business capability. Self-contained, no shared
      references.
    resources:
    - name: values-common-countries
      path: /values/common/countries
      operations:
      - name: getcountries
        method: GET
        description: Workday Integration Retrieve available countries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: recruiting-reference-data-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Recruiting API — Reference Data. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/values/common/countries
      name: values-common-countries
      description: REST surface for values-common-countries.
      operations:
      - method: GET
        name: getcountries
        description: Workday Integration Retrieve available countries
        call: recruiting-reference-data.getcountries
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: recruiting-reference-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Recruiting API — Reference Data. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-available-countries
      description: Workday Integration Retrieve available countries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: recruiting-reference-data.getcountries
      outputParameters:
      - type: object
        mapping: $.
