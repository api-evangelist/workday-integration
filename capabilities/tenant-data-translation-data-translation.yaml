naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Tenant Data Translation API — Data Translation
  description: 'Workday Integration Workday Tenant Data Translation API — Data Translation. 2 operations. Lead operation:
    Workday Integration Retrieve a collection of translations. Self-contained Naftiko capability covering one Workday Integration
    business surface.'
  tags:
  - Workday Integration
  - Data Translation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: tenant-data-translation-data-translation
    baseUri: https://{baseUrl}/ccx/api/tenantDataTranslation/v1/{tenant}
    description: Workday Integration Workday Tenant Data Translation API — Data Translation business capability. Self-contained,
      no shared references.
    resources:
    - name: translations
      path: /translations
      operations:
      - name: gettranslations
        method: GET
        description: Workday Integration Retrieve a collection of translations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: translations-ID
      path: /translations/{ID}
      operations:
      - name: gettranslationbyid
        method: GET
        description: Workday Integration Retrieve a specific Translation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: tenant-data-translation-data-translation-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Tenant Data Translation API — Data Translation. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/translations
      name: translations
      description: REST surface for translations.
      operations:
      - method: GET
        name: gettranslations
        description: Workday Integration Retrieve a collection of translations
        call: tenant-data-translation-data-translation.gettranslations
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/translations/{id}
      name: translations-id
      description: REST surface for translations-ID.
      operations:
      - method: GET
        name: gettranslationbyid
        description: Workday Integration Retrieve a specific Translation
        call: tenant-data-translation-data-translation.gettranslationbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tenant-data-translation-data-translation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Tenant Data Translation API — Data Translation. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-collection-translations
      description: Workday Integration Retrieve a collection of translations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tenant-data-translation-data-translation.gettranslations
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-translation
      description: Workday Integration Retrieve a specific Translation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tenant-data-translation-data-translation.gettranslationbyid
      outputParameters:
      - type: object
        mapping: $.
