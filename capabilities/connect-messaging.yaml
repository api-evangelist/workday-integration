naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Connect API — Messaging
  description: 'Workday Integration Workday Connect API — Messaging. 2 operations. Lead operation: Workday Integration Retrieve
    a collection of messages. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Messaging
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: connect-messaging
    baseUri: https://{baseUrl}/ccx/api/connect/v1/{tenant}
    description: Workday Integration Workday Connect API — Messaging business capability. Self-contained, no shared references.
    resources:
    - name: messages
      path: /messages
      operations:
      - name: getmessages
        method: GET
        description: Workday Integration Retrieve a collection of messages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: messages-ID
      path: /messages/{ID}
      operations:
      - name: getmessagebyid
        method: GET
        description: Workday Integration Retrieve a specific Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: connect-messaging-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Connect API — Messaging. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/messages
      name: messages
      description: REST surface for messages.
      operations:
      - method: GET
        name: getmessages
        description: Workday Integration Retrieve a collection of messages
        call: connect-messaging.getmessages
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/messages/{id}
      name: messages-id
      description: REST surface for messages-ID.
      operations:
      - method: GET
        name: getmessagebyid
        description: Workday Integration Retrieve a specific Message
        call: connect-messaging.getmessagebyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: connect-messaging-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Connect API — Messaging. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-collection-messages
      description: Workday Integration Retrieve a collection of messages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-messaging.getmessages
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-message
      description: Workday Integration Retrieve a specific Message
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: connect-messaging.getmessagebyid
      outputParameters:
      - type: object
        mapping: $.
