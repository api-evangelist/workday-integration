naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Absence Management API — Absence Types
  description: 'Workday Integration Workday Absence Management API — Absence Types. 1 operations. Lead operation: Workday
    Integration Retrieve eligible absence types for a worker. Self-contained Naftiko capability covering one Workday Integration
    business surface.'
  tags:
  - Workday Integration
  - Absence Types
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: absence-management-absence-types
    baseUri: https://{baseUrl}/ccx/api/absenceManagement/v1/{tenant}
    description: Workday Integration Workday Absence Management API — Absence Types business capability. Self-contained, no
      shared references.
    resources:
    - name: workers-ID-eligibleAbsenceTypes
      path: /workers/{ID}/eligibleAbsenceTypes
      operations:
      - name: getworkereligibleabsencetypes
        method: GET
        description: Workday Integration Retrieve eligible absence types for a worker
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: absence-management-absence-types-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Absence Management API — Absence Types. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/workers/{id}/eligibleabsencetypes
      name: workers-id-eligibleabsencetypes
      description: REST surface for workers-ID-eligibleAbsenceTypes.
      operations:
      - method: GET
        name: getworkereligibleabsencetypes
        description: Workday Integration Retrieve eligible absence types for a worker
        call: absence-management-absence-types.getworkereligibleabsencetypes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: absence-management-absence-types-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Absence Management API — Absence Types. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-eligible-absence
      description: Workday Integration Retrieve eligible absence types for a worker
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: absence-management-absence-types.getworkereligibleabsencetypes
      outputParameters:
      - type: object
        mapping: $.
