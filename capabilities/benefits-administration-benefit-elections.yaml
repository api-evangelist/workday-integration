naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Benefits Administration API — Benefit Elections
  description: 'Workday Integration Workday Benefits Administration API — Benefit Elections. 1 operations. Lead operation:
    Workday Integration Retrieve benefit elections for a worker. Self-contained Naftiko capability covering one Workday Integration
    business surface.'
  tags:
  - Workday Integration
  - Benefit Elections
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: benefits-administration-benefit-elections
    baseUri: https://{baseUrl}/ccx/api/benefits/v1/{tenant}
    description: Workday Integration Workday Benefits Administration API — Benefit Elections business capability. Self-contained,
      no shared references.
    resources:
    - name: workers-ID-benefitElections
      path: /workers/{ID}/benefitElections
      operations:
      - name: getworkerbenefitelections
        method: GET
        description: Workday Integration Retrieve benefit elections for a worker
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: benefits-administration-benefit-elections-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Benefits Administration API — Benefit Elections. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/workers/{id}/benefitelections
      name: workers-id-benefitelections
      description: REST surface for workers-ID-benefitElections.
      operations:
      - method: GET
        name: getworkerbenefitelections
        description: Workday Integration Retrieve benefit elections for a worker
        call: benefits-administration-benefit-elections.getworkerbenefitelections
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: benefits-administration-benefit-elections-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Benefits Administration API — Benefit Elections. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-benefit-elections
      description: Workday Integration Retrieve benefit elections for a worker
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: benefits-administration-benefit-elections.getworkerbenefitelections
      outputParameters:
      - type: object
        mapping: $.
