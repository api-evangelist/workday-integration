naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Revenue Management API — Revenue Schedules
  description: 'Workday Integration Workday Revenue Management API — Revenue Schedules. 1 operations. Lead operation: Workday
    Integration Retrieve revenue schedules. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Revenue Schedules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: revenue-management-revenue-schedules
    baseUri: https://{baseUrl}/ccx/api/revenueManagement/v1/{tenant}
    description: Workday Integration Workday Revenue Management API — Revenue Schedules business capability. Self-contained,
      no shared references.
    resources:
    - name: revenueSchedules
      path: /revenueSchedules
      operations:
      - name: getrevenueschedules
        method: GET
        description: Workday Integration Retrieve revenue schedules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: revenue-management-revenue-schedules-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Revenue Management API — Revenue Schedules. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/revenueschedules
      name: revenueschedules
      description: REST surface for revenueSchedules.
      operations:
      - method: GET
        name: getrevenueschedules
        description: Workday Integration Retrieve revenue schedules
        call: revenue-management-revenue-schedules.getrevenueschedules
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: revenue-management-revenue-schedules-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Revenue Management API — Revenue Schedules. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-revenue-schedules
      description: Workday Integration Retrieve revenue schedules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: revenue-management-revenue-schedules.getrevenueschedules
      outputParameters:
      - type: object
        mapping: $.
