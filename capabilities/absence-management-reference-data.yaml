naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Absence Management API — Reference Data
  description: 'Workday Integration Workday Absence Management API — Reference Data. 2 operations. Lead operation: Workday
    Integration Retrieve leave status values. Self-contained Naftiko capability covering one Workday Integration business
    surface.'
  tags:
  - Workday Integration
  - Reference Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: absence-management-reference-data
    baseUri: https://{baseUrl}/ccx/api/absenceManagement/v1/{tenant}
    description: Workday Integration Workday Absence Management API — Reference Data business capability. Self-contained,
      no shared references.
    resources:
    - name: values-leave-status
      path: /values/leave/status
      operations:
      - name: getleavestatusvalues
        method: GET
        description: Workday Integration Retrieve leave status values
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: values-timeOff-status
      path: /values/timeOff/status
      operations:
      - name: gettimeoffstatusvalues
        method: GET
        description: Workday Integration Retrieve time off status values
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: absence-management-reference-data-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Absence Management API — Reference Data. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/values/leave/status
      name: values-leave-status
      description: REST surface for values-leave-status.
      operations:
      - method: GET
        name: getleavestatusvalues
        description: Workday Integration Retrieve leave status values
        call: absence-management-reference-data.getleavestatusvalues
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/values/timeoff/status
      name: values-timeoff-status
      description: REST surface for values-timeOff-status.
      operations:
      - method: GET
        name: gettimeoffstatusvalues
        description: Workday Integration Retrieve time off status values
        call: absence-management-reference-data.gettimeoffstatusvalues
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: absence-management-reference-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Absence Management API — Reference Data. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-leave-status
      description: Workday Integration Retrieve leave status values
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: absence-management-reference-data.getleavestatusvalues
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-time-off
      description: Workday Integration Retrieve time off status values
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: absence-management-reference-data.gettimeoffstatusvalues
      outputParameters:
      - type: object
        mapping: $.
