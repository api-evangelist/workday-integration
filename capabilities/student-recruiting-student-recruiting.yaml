naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Student Recruiting API — Student Recruiting
  description: 'Workday Integration Workday Student Recruiting API — Student Recruiting. 2 operations. Lead operation: Workday
    Integration Retrieve a collection of prospects. Self-contained Naftiko capability covering one Workday Integration business
    surface.'
  tags:
  - Workday Integration
  - Student Recruiting
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: student-recruiting-student-recruiting
    baseUri: https://{baseUrl}/ccx/api/studentRecruiting/v1/{tenant}
    description: Workday Integration Workday Student Recruiting API — Student Recruiting business capability. Self-contained,
      no shared references.
    resources:
    - name: prospects
      path: /prospects
      operations:
      - name: getprospects
        method: GET
        description: Workday Integration Retrieve a collection of prospects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: prospects-ID
      path: /prospects/{ID}
      operations:
      - name: getprospectbyid
        method: GET
        description: Workday Integration Retrieve a specific Prospect
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: student-recruiting-student-recruiting-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Student Recruiting API — Student Recruiting. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/prospects
      name: prospects
      description: REST surface for prospects.
      operations:
      - method: GET
        name: getprospects
        description: Workday Integration Retrieve a collection of prospects
        call: student-recruiting-student-recruiting.getprospects
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/prospects/{id}
      name: prospects-id
      description: REST surface for prospects-ID.
      operations:
      - method: GET
        name: getprospectbyid
        description: Workday Integration Retrieve a specific Prospect
        call: student-recruiting-student-recruiting.getprospectbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: student-recruiting-student-recruiting-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Student Recruiting API — Student Recruiting. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-collection-prospects
      description: Workday Integration Retrieve a collection of prospects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: student-recruiting-student-recruiting.getprospects
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-prospect
      description: Workday Integration Retrieve a specific Prospect
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: student-recruiting-student-recruiting.getprospectbyid
      outputParameters:
      - type: object
        mapping: $.
