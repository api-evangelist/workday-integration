naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Time Tracking API — Validations
  description: 'Workday Integration Workday Time Tracking API — Validations. 1 operations. Lead operation: Workday Integration
    Retrieve time validation results. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Validations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: time-tracking-validations
    baseUri: https://{baseUrl}/ccx/api/timeTracking/v1/{tenant}
    description: Workday Integration Workday Time Tracking API — Validations business capability. Self-contained, no shared
      references.
    resources:
    - name: timeValidations
      path: /timeValidations
      operations:
      - name: gettimevalidations
        method: GET
        description: Workday Integration Retrieve time validation results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: time-tracking-validations-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Time Tracking API — Validations. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/timevalidations
      name: timevalidations
      description: REST surface for timeValidations.
      operations:
      - method: GET
        name: gettimevalidations
        description: Workday Integration Retrieve time validation results
        call: time-tracking-validations.gettimevalidations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: time-tracking-validations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Time Tracking API — Validations. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-time-validation
      description: Workday Integration Retrieve time validation results
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: time-tracking-validations.gettimevalidations
      outputParameters:
      - type: object
        mapping: $.
