naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Academic Foundation API — Academic Foundation
  description: 'Workday Integration Workday Academic Foundation API — Academic Foundation. 2 operations. Lead operation: Workday
    Integration Retrieve a collection of academicUnits. Self-contained Naftiko capability covering one Workday Integration
    business surface.'
  tags:
  - Workday Integration
  - Academic Foundation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: academic-foundation-academic-foundation
    baseUri: https://{baseUrl}/ccx/api/academicFoundation/v1/{tenant}
    description: Workday Integration Workday Academic Foundation API — Academic Foundation business capability. Self-contained,
      no shared references.
    resources:
    - name: academicUnits
      path: /academicUnits
      operations:
      - name: getacademicunits
        method: GET
        description: Workday Integration Retrieve a collection of academicUnits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: academicUnits-ID
      path: /academicUnits/{ID}
      operations:
      - name: getacademicunitbyid
        method: GET
        description: Workday Integration Retrieve a specific AcademicUnit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: academic-foundation-academic-foundation-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Academic Foundation API — Academic Foundation. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/academicunits
      name: academicunits
      description: REST surface for academicUnits.
      operations:
      - method: GET
        name: getacademicunits
        description: Workday Integration Retrieve a collection of academicUnits
        call: academic-foundation-academic-foundation.getacademicunits
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/academicunits/{id}
      name: academicunits-id
      description: REST surface for academicUnits-ID.
      operations:
      - method: GET
        name: getacademicunitbyid
        description: Workday Integration Retrieve a specific AcademicUnit
        call: academic-foundation-academic-foundation.getacademicunitbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: academic-foundation-academic-foundation-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Academic Foundation API — Academic Foundation. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-collection-academicunits
      description: Workday Integration Retrieve a collection of academicUnits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: academic-foundation-academic-foundation.getacademicunits
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-academicunit
      description: Workday Integration Retrieve a specific AcademicUnit
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: academic-foundation-academic-foundation.getacademicunitbyid
      outputParameters:
      - type: object
        mapping: $.
