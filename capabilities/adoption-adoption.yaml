naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Adoption API — Adoption
  description: 'Workday Integration Workday Adoption API — Adoption. 2 operations. Lead operation: Workday Integration Retrieve
    a collection of adoptionMetrics. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Adoption
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: adoption-adoption
    baseUri: https://{baseUrl}/ccx/api/adoption/v1/{tenant}
    description: Workday Integration Workday Adoption API — Adoption business capability. Self-contained, no shared references.
    resources:
    - name: adoptionMetrics
      path: /adoptionMetrics
      operations:
      - name: getadoptionmetrics
        method: GET
        description: Workday Integration Retrieve a collection of adoptionMetrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: adoptionMetrics-ID
      path: /adoptionMetrics/{ID}
      operations:
      - name: getadoptionmetricbyid
        method: GET
        description: Workday Integration Retrieve a specific AdoptionMetric
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: adoption-adoption-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Adoption API — Adoption. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/adoptionmetrics
      name: adoptionmetrics
      description: REST surface for adoptionMetrics.
      operations:
      - method: GET
        name: getadoptionmetrics
        description: Workday Integration Retrieve a collection of adoptionMetrics
        call: adoption-adoption.getadoptionmetrics
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/adoptionmetrics/{id}
      name: adoptionmetrics-id
      description: REST surface for adoptionMetrics-ID.
      operations:
      - method: GET
        name: getadoptionmetricbyid
        description: Workday Integration Retrieve a specific AdoptionMetric
        call: adoption-adoption.getadoptionmetricbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: adoption-adoption-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Adoption API — Adoption. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-collection-adoptionmetrics
      description: Workday Integration Retrieve a collection of adoptionMetrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adoption-adoption.getadoptionmetrics
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-adoptionmetric
      description: Workday Integration Retrieve a specific AdoptionMetric
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: adoption-adoption.getadoptionmetricbyid
      outputParameters:
      - type: object
        mapping: $.
