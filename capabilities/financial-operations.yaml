naftiko: "1.0.0-alpha1"

info:
  label: "Workday Financial Operations Workflow"
  description: "Integrated financial operations workflow combining general ledger, accounts payable, accounts receivable, procurement, cash management, and financial reporting capabilities in Workday."
  tags:
    - Workday
    - Integration
    - Financial Management
    - Accounting
    - Procurement
    - Cash Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKDAY_INTEGRATION_ACCESS_TOKEN: WORKDAY_INTEGRATION_ACCESS_TOKEN
      WORKDAY_TENANT: WORKDAY_TENANT

capability:
  consumes:
    - type: http
      namespace: financials
      baseUri: https://wd2-impl-services1.workday.com/ccx/service/{tenant}
      description: "Workday Financial Management API"
      authentication:
        type: bearer
        token: "{{WORKDAY_INTEGRATION_ACCESS_TOKEN}}"
      resources:
        - name: ledger-accounts
          path: /ledgerAccounts
          operations:
            - name: list-ledger-accounts
              method: GET
              description: "List ledger accounts"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: journal-entries
          path: /journalEntries
          operations:
            - name: list-journal-entries
              method: GET
              description: "List journal entries"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-journal-entry
              method: GET
              description: "Get a journal entry"
              inputParameters:
                - name: journalEntryId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: cost-centers
          path: /costCenters
          operations:
            - name: list-cost-centers
              method: GET
              description: "List cost centers"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
    - type: http
      namespace: cash-management
      baseUri: https://wd2-impl-services1.workday.com/ccx/service/{tenant}
      description: "Workday Cash Management API"
      authentication:
        type: bearer
        token: "{{WORKDAY_INTEGRATION_ACCESS_TOKEN}}"
      resources:
        - name: bank-accounts
          path: /bankAccounts
          operations:
            - name: list-bank-accounts
              method: GET
              description: "List bank accounts"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: transactions
          path: /bankTransactions
          operations:
            - name: list-transactions
              method: GET
              description: "List bank transactions"
              inputParameters:
                - name: period
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8083
      namespace: financial-operations-rest-api
      resources:
        - path: /v1/ledger-accounts
          name: ledger-accounts
          operations:
            - method: GET
              name: list-ledger-accounts
              call: "financials.list-ledger-accounts"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/journal-entries
          name: journal-entries
          operations:
            - method: GET
              name: list-journal-entries
              call: "financials.list-journal-entries"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9093
      namespace: financial-operations-mcp
      transport: http
      tools:
        - name: list-ledger-accounts
          description: "List general ledger accounts"
          hints:
            readOnly: true
            openWorld: true
          call: "financials.list-ledger-accounts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-journal-entries
          description: "List accounting journal entries"
          hints:
            readOnly: true
            openWorld: true
          call: "financials.list-journal-entries"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-journal-entry
          description: "Get details of a journal entry"
          hints:
            readOnly: true
            openWorld: false
          call: "financials.get-journal-entry"
          with:
            journalEntryId: "tools.journalEntryId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-cost-centers
          description: "List financial cost centers"
          hints:
            readOnly: true
            openWorld: true
          call: "financials.list-cost-centers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-bank-accounts
          description: "List bank accounts"
          hints:
            readOnly: true
            openWorld: true
          call: "cash-management.list-bank-accounts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-transactions
          description: "List bank transactions"
          hints:
            readOnly: true
            openWorld: true
          call: "cash-management.list-transactions"
          outputParameters:
            - type: object
              mapping: "$."
