naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Performance Management API — Performance Reviews
  description: 'Workday Integration Workday Performance Management API — Performance Reviews. 1 operations. Lead operation:
    Workday Integration Retrieve performance reviews for a worker. Self-contained Naftiko capability covering one Workday
    Integration business surface.'
  tags:
  - Workday Integration
  - Performance Reviews
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: performance-management-performance-reviews
    baseUri: https://{baseUrl}/ccx/api/performanceManagement/v1/{tenant}
    description: Workday Integration Workday Performance Management API — Performance Reviews business capability. Self-contained,
      no shared references.
    resources:
    - name: workers-ID-performanceReviews
      path: /workers/{ID}/performanceReviews
      operations:
      - name: getworkerperformancereviews
        method: GET
        description: Workday Integration Retrieve performance reviews for a worker
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: performance-management-performance-reviews-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Performance Management API — Performance Reviews. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/workers/{id}/performancereviews
      name: workers-id-performancereviews
      description: REST surface for workers-ID-performanceReviews.
      operations:
      - method: GET
        name: getworkerperformancereviews
        description: Workday Integration Retrieve performance reviews for a worker
        call: performance-management-performance-reviews.getworkerperformancereviews
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: performance-management-performance-reviews-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Performance Management API — Performance Reviews. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-performance-reviews
      description: Workday Integration Retrieve performance reviews for a worker
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: performance-management-performance-reviews.getworkerperformancereviews
      outputParameters:
      - type: object
        mapping: $.
