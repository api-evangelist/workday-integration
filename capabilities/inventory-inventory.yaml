naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Inventory API — Inventory
  description: 'Workday Integration Workday Inventory API — Inventory. 2 operations. Lead operation: Workday Integration Retrieve
    a collection of inventoryItems. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Inventory
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: inventory-inventory
    baseUri: https://{baseUrl}/ccx/api/inventory/v1/{tenant}
    description: Workday Integration Workday Inventory API — Inventory business capability. Self-contained, no shared references.
    resources:
    - name: inventoryItems
      path: /inventoryItems
      operations:
      - name: getinventoryitems
        method: GET
        description: Workday Integration Retrieve a collection of inventoryItems
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: inventoryItems-ID
      path: /inventoryItems/{ID}
      operations:
      - name: getinventoryitembyid
        method: GET
        description: Workday Integration Retrieve a specific InventoryItem
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: inventory-inventory-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Inventory API — Inventory. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/inventoryitems
      name: inventoryitems
      description: REST surface for inventoryItems.
      operations:
      - method: GET
        name: getinventoryitems
        description: Workday Integration Retrieve a collection of inventoryItems
        call: inventory-inventory.getinventoryitems
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/inventoryitems/{id}
      name: inventoryitems-id
      description: REST surface for inventoryItems-ID.
      operations:
      - method: GET
        name: getinventoryitembyid
        description: Workday Integration Retrieve a specific InventoryItem
        call: inventory-inventory.getinventoryitembyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: inventory-inventory-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Inventory API — Inventory. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-collection-inventoryitems
      description: Workday Integration Retrieve a collection of inventoryItems
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: inventory-inventory.getinventoryitems
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-inventoryitem
      description: Workday Integration Retrieve a specific InventoryItem
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: inventory-inventory.getinventoryitembyid
      outputParameters:
      - type: object
        mapping: $.
