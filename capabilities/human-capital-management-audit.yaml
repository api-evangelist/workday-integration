naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Human Capital Management API — Audit
  description: 'Workday Integration Workday Human Capital Management API — Audit. 1 operations. Lead operation: Workday Integration
    Retrieve audit logs. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Audit
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: human-capital-management-audit
    baseUri: https://{baseUrl}/ccx/api/v1/{tenant}
    description: Workday Integration Workday Human Capital Management API — Audit business capability. Self-contained, no
      shared references.
    resources:
    - name: auditLogs
      path: /auditLogs
      operations:
      - name: getauditlogs
        method: GET
        description: Workday Integration Retrieve audit logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: human-capital-management-audit-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Human Capital Management API — Audit. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/auditlogs
      name: auditlogs
      description: REST surface for auditLogs.
      operations:
      - method: GET
        name: getauditlogs
        description: Workday Integration Retrieve audit logs
        call: human-capital-management-audit.getauditlogs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: human-capital-management-audit-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Human Capital Management API — Audit. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-audit-logs
      description: Workday Integration Retrieve audit logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: human-capital-management-audit.getauditlogs
      outputParameters:
      - type: object
        mapping: $.
