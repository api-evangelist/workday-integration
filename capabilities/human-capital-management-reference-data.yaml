naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Human Capital Management API — Reference Data
  description: 'Workday Integration Workday Human Capital Management API — Reference Data. 2 operations. Lead operation: Workday
    Integration Retrieve currencies. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Reference Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: human-capital-management-reference-data
    baseUri: https://{baseUrl}/ccx/api/v1/{tenant}
    description: Workday Integration Workday Human Capital Management API — Reference Data business capability. Self-contained,
      no shared references.
    resources:
    - name: currencies
      path: /currencies
      operations:
      - name: getcurrencies
        method: GET
        description: Workday Integration Retrieve currencies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: jobChangeReasons
      path: /jobChangeReasons
      operations:
      - name: getjobchangereasons
        method: GET
        description: Workday Integration Retrieve job change reasons
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: human-capital-management-reference-data-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Human Capital Management API — Reference Data. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/currencies
      name: currencies
      description: REST surface for currencies.
      operations:
      - method: GET
        name: getcurrencies
        description: Workday Integration Retrieve currencies
        call: human-capital-management-reference-data.getcurrencies
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobchangereasons
      name: jobchangereasons
      description: REST surface for jobChangeReasons.
      operations:
      - method: GET
        name: getjobchangereasons
        description: Workday Integration Retrieve job change reasons
        call: human-capital-management-reference-data.getjobchangereasons
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: human-capital-management-reference-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Human Capital Management API — Reference Data. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-currencies
      description: Workday Integration Retrieve currencies
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: human-capital-management-reference-data.getcurrencies
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-job-change
      description: Workday Integration Retrieve job change reasons
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: human-capital-management-reference-data.getjobchangereasons
      outputParameters:
      - type: object
        mapping: $.
