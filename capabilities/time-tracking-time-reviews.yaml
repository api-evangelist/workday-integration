naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Time Tracking API — Time Reviews
  description: 'Workday Integration Workday Time Tracking API — Time Reviews. 1 operations. Lead operation: Workday Integration
    Create a time review event for a worker. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Time Reviews
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: time-tracking-time-reviews
    baseUri: https://{baseUrl}/ccx/api/timeTracking/v1/{tenant}
    description: Workday Integration Workday Time Tracking API — Time Reviews business capability. Self-contained, no shared
      references.
    resources:
    - name: workers-ID-timeReviewEvents
      path: /workers/{ID}/timeReviewEvents
      operations:
      - name: createtimereviewevent
        method: POST
        description: Workday Integration Create a time review event for a worker
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: time-tracking-time-reviews-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Time Tracking API — Time Reviews. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/workers/{id}/timereviewevents
      name: workers-id-timereviewevents
      description: REST surface for workers-ID-timeReviewEvents.
      operations:
      - method: POST
        name: createtimereviewevent
        description: Workday Integration Create a time review event for a worker
        call: time-tracking-time-reviews.createtimereviewevent
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: time-tracking-time-reviews-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Time Tracking API — Time Reviews. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-create-time-review
      description: Workday Integration Create a time review event for a worker
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: time-tracking-time-reviews.createtimereviewevent
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
