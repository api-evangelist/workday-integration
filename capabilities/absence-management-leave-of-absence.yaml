naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Absence Management API — Leave of Absence
  description: 'Workday Integration Workday Absence Management API — Leave of Absence. 2 operations. Lead operation: Workday
    Integration Retrieve leaves of absence for a worker. Self-contained Naftiko capability covering one Workday Integration
    business surface.'
  tags:
  - Workday Integration
  - Leave of Absence
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: absence-management-leave-of-absence
    baseUri: https://{baseUrl}/ccx/api/absenceManagement/v1/{tenant}
    description: Workday Integration Workday Absence Management API — Leave of Absence business capability. Self-contained,
      no shared references.
    resources:
    - name: workers-ID-leavesOfAbsence
      path: /workers/{ID}/leavesOfAbsence
      operations:
      - name: getworkerleavesofabsence
        method: GET
        description: Workday Integration Retrieve leaves of absence for a worker
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: workers-ID-leavesOfAbsence-subresourceID
      path: /workers/{ID}/leavesOfAbsence/{subresourceID}
      operations:
      - name: getworkerleaveofabsencebyid
        method: GET
        description: Workday Integration Retrieve a specific leave of absence for a worker
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subresourceID
          in: path
          type: string
          description: The Workday ID of the leave of absence
          required: true
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: absence-management-leave-of-absence-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Absence Management API — Leave of Absence. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/workers/{id}/leavesofabsence
      name: workers-id-leavesofabsence
      description: REST surface for workers-ID-leavesOfAbsence.
      operations:
      - method: GET
        name: getworkerleavesofabsence
        description: Workday Integration Retrieve leaves of absence for a worker
        call: absence-management-leave-of-absence.getworkerleavesofabsence
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/workers/{id}/leavesofabsence/{subresourceid}
      name: workers-id-leavesofabsence-subresourceid
      description: REST surface for workers-ID-leavesOfAbsence-subresourceID.
      operations:
      - method: GET
        name: getworkerleaveofabsencebyid
        description: Workday Integration Retrieve a specific leave of absence for a worker
        call: absence-management-leave-of-absence.getworkerleaveofabsencebyid
        with:
          subresourceID: rest.subresourceID
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: absence-management-leave-of-absence-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Absence Management API — Leave of Absence. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-leaves-absence
      description: Workday Integration Retrieve leaves of absence for a worker
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: absence-management-leave-of-absence.getworkerleavesofabsence
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-leave
      description: Workday Integration Retrieve a specific leave of absence for a worker
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: absence-management-leave-of-absence.getworkerleaveofabsencebyid
      with:
        subresourceID: tools.subresourceID
      outputParameters:
      - type: object
        mapping: $.
