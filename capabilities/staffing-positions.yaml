naftiko: 1.0.0-alpha2
info:
  label: Workday Integration Workday Staffing API — Positions
  description: 'Workday Integration Workday Staffing API — Positions. 2 operations. Lead operation: Workday Integration Retrieve
    positions. Self-contained Naftiko capability covering one Workday Integration business surface.'
  tags:
  - Workday Integration
  - Positions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_INTEGRATION_API_KEY: WORKDAY_INTEGRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: staffing-positions
    baseUri: https://{baseUrl}/ccx/api/staffing/v1/{tenant}
    description: Workday Integration Workday Staffing API — Positions business capability. Self-contained, no shared references.
    resources:
    - name: positions
      path: /positions
      operations:
      - name: getpositions
        method: GET
        description: Workday Integration Retrieve positions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: positions-ID
      path: /positions/{ID}
      operations:
      - name: getpositionbyid
        method: GET
        description: Workday Integration Retrieve a specific position
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_INTEGRATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: staffing-positions-rest
    port: 8080
    description: REST adapter for Workday Integration Workday Staffing API — Positions. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/positions
      name: positions
      description: REST surface for positions.
      operations:
      - method: GET
        name: getpositions
        description: Workday Integration Retrieve positions
        call: staffing-positions.getpositions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/positions/{id}
      name: positions-id
      description: REST surface for positions-ID.
      operations:
      - method: GET
        name: getpositionbyid
        description: Workday Integration Retrieve a specific position
        call: staffing-positions.getpositionbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: staffing-positions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Integration Workday Staffing API — Positions. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: workday-integration-retrieve-positions
      description: Workday Integration Retrieve positions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: staffing-positions.getpositions
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-integration-retrieve-specific-position
      description: Workday Integration Retrieve a specific position
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: staffing-positions.getpositionbyid
      outputParameters:
      - type: object
        mapping: $.
