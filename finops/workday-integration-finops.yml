specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Workday Integration
providerId: workday-integration
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Integration
  - iPaaS
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps stub for Workday Integration Cloud. Integration entitlement is bundled into the Workday tenant subscription; per-integration-run pricing and a public usage API are not exposed, so meters describe contractual entitlement and integration inventory rather than runtime billing.
sources:
  - https://www.workday.com/en-us/enterprise-resource-planning.html
notes: No public pricing or billing API exists. Generic api_request / data_egress / compute_seconds meters from the scaffold have been removed.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Workday, Inc.
serviceCategory: Integration / iPaaS
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Workday Integration Cloud
  ServiceCategory: Integration / iPaaS
  ProviderName: Workday
  PublisherName: Workday, Inc.
  InvoiceIssuerName: Workday, Inc.
  BillingCurrency: USD
meters:
  - name: integration_cloud_entitlement
    description: Annual Workday Integration Cloud entitlement attached to the tenant subscription, covering Studio runtime and Cloud Connect packs included in the contract.
    unit: month
    aggregation: max
    dimensions:
      - tenant
  - name: integrations_in_production
    description: Count of customer-built and Cloud Connect integrations active in the tenant; tracked for governance and renewal sizing rather than per-run billing.
    unit: integration
    aggregation: max
    dimensions:
      - tenant
      - integration_type
principles:
  - name: Visibility
    description: Maintain an internal inventory of integrations (Cloud Connect, Studio, EIB) with owner, source / target system, and frequency; pair with Workday integration event reports to confirm utilization since invoice line items don't break out per integration.
  - name: Allocation
    description: Allocate Integration Cloud spend to the systems-of-record on each end of an integration (HR, Finance, IT) and tie new integrations back to the requesting business case so the platform fee is justified.
  - name: Optimization
    description: Retire dead integrations before renewal, prefer EIB over custom Studio where the data shape allows, schedule batch runs during low-load windows to fit within tenant concurrency, and consolidate point-to-point flows into reusable Studio templates.
  - name: Accountability
    description: An Integration Center of Excellence lead should own approval of new integrations, periodic reviews of inventory, and renewal-time consolidation with Workday sales.
maintainers:
